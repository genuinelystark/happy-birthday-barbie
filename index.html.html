<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happy Buttday Barbie :3</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#071410;
  --pink:#ff69b4;
  --pink-light:#ffb3d9;
  --pink-glow:rgba(255,105,180,0.7);
  --gold:#f5c842;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

body{
  background:radial-gradient(ellipse at center,#0d2018 0%,#071410 70%);
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
  font-family:'Press Start 2P',monospace;
  cursor:crosshair;
}
body::after{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,0,0,0.06) 3px,rgba(0,0,0,0.06) 4px);
  pointer-events:none;z-index:200;
}

#starfield,#confetti-canvas{position:fixed;inset:0;pointer-events:none;}
#starfield{z-index:0;}
#rose-layer{position:fixed;inset:0;pointer-events:none;z-index:1;}
#confetti-canvas{z-index:50;}

.container{
  position:relative;z-index:10;
  display:flex;flex-direction:column;align-items:center;
  gap:22px;padding:30px 20px;
}

/* ── TITLE — much larger + intense glow ── */
.title-line1{
  font-size:clamp(16px,3.2vw,28px);
  color:var(--pink-light);
  text-align:center;
  letter-spacing:3px;
  line-height:1.6;
  text-shadow:
    0 0 6px  #fff,
    0 0 12px var(--pink),
    0 0 28px var(--pink),
    0 0 55px var(--pink-glow),
    0 0 90px rgba(255,105,180,0.4);
  animation:titlePulse 2.5s ease-in-out infinite;
}
.title-line2{
  font-size:clamp(22px,4.5vw,42px);
  color:#ff9ed2;
  text-align:center;
  letter-spacing:4px;
  line-height:1.5;
  text-shadow:
    0 0 8px  #fff,
    0 0 18px var(--pink),
    0 0 40px var(--pink),
    0 0 80px var(--pink-glow),
    0 0 130px rgba(255,105,180,0.5),
    0 0 200px rgba(255,105,180,0.25);
  animation:titlePulse 2.5s ease-in-out infinite;
}
.title-face{
  font-size:clamp(18px,3.5vw,32px);
  color:#fff;
  text-align:center;
  letter-spacing:3px;
  text-shadow:
    0 0 8px #fff,
    0 0 20px var(--pink),
    0 0 45px var(--pink-glow);
  animation:titlePulse 2.5s ease-in-out infinite 0.4s;
}

@keyframes titlePulse{
  0%,100%{filter:brightness(1);}
  50%{filter:brightness(1.3) saturate(1.2);}
}

/* ── Cake ── */
.cake-scene{
  cursor:pointer;
  filter:drop-shadow(0 0 22px rgba(180,0,40,0.45));
  transition:transform 0.15s;
}
.cake-scene:hover{transform:scale(1.04);}
.cake-scene:active{transform:scale(0.97);}

/* flame */
#flame-g{
  transform-origin:110px 34px;
  animation:flicker 1.7s ease-in-out infinite;
}
@keyframes flicker{
  0%  {transform:scaleX(1)    scaleY(1)    translate(0,0);}
  15% {transform:scaleX(0.82) scaleY(1.18) translate(-1.5px,-2px);}
  30% {transform:scaleX(1.14) scaleY(0.90) translate(1px,1px);}
  50% {transform:scaleX(0.88) scaleY(1.10) translate(2px,-1px);}
  70% {transform:scaleX(1.06) scaleY(0.95) translate(-1px,0);}
  85% {transform:scaleX(0.92) scaleY(1.08) translate(0.5px,-1.5px);}
  100%{transform:scaleX(1)    scaleY(1)    translate(0,0);}
}
#flame-g.blown{
  animation:none;
  transition:opacity 0.4s,transform 0.4s;
  opacity:0 !important;
  transform:translateY(-20px) scaleY(0.05) !important;
}
#smoke-g{opacity:0;}
#smoke-g.show{animation:puff 2.5s ease-out forwards;}
@keyframes puff{
  0%  {opacity:0.8;transform:translateY(0)     scaleX(1);}
  100%{opacity:0;  transform:translateY(-40px) scaleX(3);}
}

/* hint + status */
.hint{
  font-size:clamp(14px,2.4vw,20px);
  color:#7dda96;
  text-align:center;line-height:2;letter-spacing:1px;
  text-shadow:0 0 12px rgba(100,220,130,0.7),0 0 24px rgba(100,220,130,0.4);
  animation:blink 1.4s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.15}}

.status{
  font-size:clamp(12px,1.8vw,16px);
  color:var(--pink-light);text-align:center;
  min-height:28px;line-height:2;
  text-shadow:0 0 10px var(--pink),0 0 22px var(--pink-glow);
}

.wish{
  display:none;
  font-size:clamp(12px,2vw,18px);
  color:var(--gold);text-align:center;line-height:2.3;
  text-shadow:0 0 12px var(--gold),0 0 28px rgba(245,200,66,0.5),0 0 55px rgba(245,200,66,0.3);
  animation:pop 0.8s ease forwards;
}
@keyframes pop{from{opacity:0;transform:scale(0.7);}to{opacity:1;transform:scale(1);}}

/* vol bar */
#vol-wrap{
  display:none;width:200px;height:14px;
  background:#1a0010;border:2px solid #3a1030;
}
#vol-bar{height:100%;width:0%;background:#7dda96;transition:width 0.04s;}

/* mic overlay */
#mic-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.8);z-index:300;
  align-items:center;justify-content:center;
}
#mic-overlay.show{display:flex;}
.mic-box{
  background:#0d2018;border:3px solid var(--pink);
  padding:32px 36px;text-align:center;
  box-shadow:0 0 40px var(--pink-glow),0 0 80px rgba(255,105,180,0.2);
  max-width:360px;
}
.mic-box p{
  font-size:12px;color:var(--pink-light);line-height:2.2;margin-bottom:24px;
}
.mic-btn{
  font-family:'Press Start 2P',monospace;font-size:11px;
  background:var(--pink);color:#1a0010;
  border:none;cursor:pointer;
  padding:14px 22px;margin:6px;
  box-shadow:0 0 16px var(--pink-glow);
  transition:transform 0.1s,box-shadow 0.1s;
}
.mic-btn:hover{transform:scale(1.06);box-shadow:0 0 28px var(--pink-glow);}
.mic-btn.secondary{background:#1e4428;color:var(--pink-light);box-shadow:none;}

#music-note{
  position:fixed;top:16px;right:20px;font-size:11px;color:#4a8060;
  font-family:'Press Start 2P',monospace;z-index:20;
  opacity:0;transition:opacity 1s;
}
#music-note.show{opacity:1;animation:float 2.5s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

/* sandbox warning */
#sandbox-note{
  display:none;position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  font-size:8px;color:#4a6050;text-align:center;line-height:1.8;
  z-index:20;white-space:nowrap;
}
</style>

}));

  [_,_,BK,GB,GC,GD,GF,GE,SC,SA,GB,GC,GF,GG,GF,BK,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_],
  [_,_,_,BK,GB,GD,GE,GF,SC,SA,BK,GD,GE,GF,BK,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_],
  [_,_,_,_,BK,GC,GD,GE,SC,SA,BK,GC,GD,BK,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_],
  [_,_,_,_,_,BK,GC,SC,SA,BK,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_],
  [_,_,_,_,_,_,BK,SC,SA,GC,GD,BK,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_],
  [_,_,_,_,_,_,BK,SC,SA,GC,GE,GF,BK,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_],
  [_,_,_,_,_,_,BK,SC,SA,BK,GD,GE,BK,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_],
  [_,_,_,_,_,_,BK,SC,SA,BK,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_],
  [_,_,_,_,_,_,_,BK,BK,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_],
];
const PX=5,RW=ROSE[0].length*PX,RH=ROSE.length*PX;
function drawRose(cv){
  cv.width=RW;cv.height=RH;
  const c=cv.getContext('2d');c.clearRect(0,0,RW,RH);
  ROSE.forEach((row,ry)=>row.forEach((col,cx3)=>{
    if(!col)return;c.fillStyle=col;c.fillRect(cx3*PX,ry*PX,PX,PX);
  }));
}
const roseLayer=document.getElementById('rose-layer');
function placeRoses(){
  roseLayer.innerHTML='';
  const gx=180,gy=190,cols=Math.ceil(innerWidth/gx)+1,rows=Math.ceil(innerHeight/gy)+1;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const offX=(r%2===0)?0:gx/2;
    const cv=document.createElement('canvas');
    cv.style.cssText='position:absolute;image-rendering:pixelated;image-rendering:crisp-edges;'+
      'opacity:0.15;left:'+(c*gx+offX-25)+'px;top:'+(r*gy-35)+'px';
    drawRose(cv);roseLayer.appendChild(cv);
  }
}
placeRoses();window.addEventListener('resize',placeRoses);

/* ══ CONFETTI ══ */
const cc2=document.getElementById('confetti-canvas'),cx2=cc2.getContext('2d');
function rcc(){cc2.width=innerWidth;cc2.height=innerHeight;} rcc();
window.addEventListener('resize',rcc);
const CCOLS=['#ff69b4','#ffff55','#88ffaa','#55ffff','#ff88ff','#ffcc55','#c8ffd4','#ffb3d9','#ff4466','#c0002a','#aaffcc'];
let parts=[],cfRunning=false;
function launchConfetti(){
  rcc();parts=[];
  for(let i=0;i<240;i++)parts.push({
    x:Math.random()*cc2.width,y:-15-Math.random()*100,
    vx:(Math.random()-0.5)*7,vy:Math.random()*4.5+1.5,
    w:Math.round(Math.random()*7+4),h:Math.round(Math.random()*5+3),
    color:CCOLS[Math.floor(Math.random()*CCOLS.length)],
    rot:Math.random()*Math.PI*2,rv:(Math.random()-0.5)*0.25,
    life:1,decay:0.002+Math.random()*0.004
  });
  if(!cfRunning){cfRunning=true;animConf();}
}
function animConf(){
  cx2.clearRect(0,0,cc2.width,cc2.height);let alive=false;
  parts.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.06;p.rot+=p.rv;p.life-=p.decay;
    if(p.life>0&&p.y<cc2.height+20){
      alive=true;cx2.save();cx2.globalAlpha=Math.min(1,p.life);
      cx2.translate(p.x,p.y);cx2.rotate(p.rot);
      cx2.fillStyle=p.color;cx2.fillRect(-p.w/2,-p.h/2,p.w,p.h);cx2.restore();
    }
  });
  if(alive)requestAnimationFrame(animConf);
  else{cfRunning=false;cx2.clearRect(0,0,cc2.width,cc2.height);}
}

/* ══ MIC + FLAME ══
   The mic requires:
   1. A true top-level browsing context (not sandboxed iframe)
   2. HTTPS or localhost
   3. getUserMedia called directly inside a user-gesture handler
   
   Flow: cake click → show overlay → user clicks "Allow Mic" button
   → getUserMedia fires from inside that button's click handler ✓
══ */
const flameG=document.getElementById('flame-g');
const smokeG=document.getElementById('smoke-g');
const hint=document.getElementById('hint');
const statusEl=document.getElementById('status');
const wishEl=document.getElementById('wish');
const cakeScene=document.getElementById('cakeScene');
const overlay=document.getElementById('mic-overlay');
const allowBtn=document.getElementById('allow-btn');
const skipBtn=document.getElementById('skip-btn');
const volWrap=document.getElementById('vol-wrap');
const volBar=document.getElementById('vol-bar');

let flameAlive=true,listening=false,micStream=null,detectFrame=null,clickFallback=0;

function blowOut(){
  if(!flameAlive)return;
  flameAlive=false;
  flameG.classList.add('blown');
  smokeG.classList.add('show');
  if(micStream)micStream.getTracks().forEach(t=>t.stop());
  cancelAnimationFrame(detectFrame);
  volWrap.style.display='none';
  hint.style.display='none';
  statusEl.textContent='🌬️ you blew it out!';
  if(ytPlayer&&ytPlayer.setVolume)ytPlayer.setVolume(3);
  setTimeout(()=>{statusEl.style.display='none';wishEl.style.display='block';},1100);
  launchConfetti();
  setTimeout(launchConfetti,1500);
  setTimeout(launchConfetti,3000);
}

/* Called directly from button click — this IS the user gesture */
allowBtn.addEventListener('click', async function(){
  overlay.classList.remove('show');
  statusEl.textContent='🎤 requesting mic…';
  try{
    /* This must stay directly in the click handler — no await before this line */
    const stream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    micStream=stream;

    const AC=window.AudioContext||window.webkitAudioContext;
    const ac=new AC();
    await ac.resume();

    const analyser=ac.createAnalyser();
    analyser.fftSize=2048;
    analyser.smoothingTimeConstant=0.2;
    ac.createMediaStreamSource(stream).connect(analyser);

    const buf=new Float32Array(analyser.fftSize);
    statusEl.textContent='🎤 ready — blow now!';
    volWrap.style.display='block';

    let blowFrames=0;
    const THRESH=0.030; // RMS — tune up if too sensitive, down if not sensitive enough
    const NEEDED=5;

    function check(){
      if(!flameAlive)return;
      analyser.getFloatTimeDomainData(buf);
      let sum=0;for(let i=0;i<buf.length;i++)sum+=buf[i]*buf[i];
      const rms=Math.sqrt(sum/buf.length);
      const pct=Math.min(100,Math.round(rms/0.12*100));
      volBar.style.width=pct+'%';
      volBar.style.background=pct>25?'#ff69b4':'#7dda96';

      if(rms>THRESH){
        blowFrames++;
        flameG.style.animationDuration=Math.max(0.25,1.7-blowFrames*0.28)+'s';
        if(blowFrames>=NEEDED){blowOut();return;}
      } else {
        blowFrames=Math.max(0,blowFrames-1);
        flameG.style.animationDuration='1.7s';
      }
      detectFrame=requestAnimationFrame(check);
    }
    check();

  } catch(err){
    console.warn('Mic error:',err.name,err.message);
    statusEl.textContent='❌ mic denied — click cake 3× instead!';
    enableFallback();
  }
});

skipBtn.addEventListener('click',()=>{
  overlay.classList.remove('show');
  statusEl.textContent='click cake 3× to blow! 💨';
  enableFallback();
});

function enableFallback(){
  cakeScene.addEventListener('click',function fb(){
    if(!flameAlive)return;
    clickFallback++;
    statusEl.textContent='💨 '+clickFallback+'/3 — click again!';
    if(clickFallback>=3){blowOut();cakeScene.removeEventListener('click',fb);}
  });
}

/* First cake click → show overlay */
cakeScene.addEventListener('click',function onFirst(){
  if(listening)return;
  listening=true;
  cakeScene.removeEventListener('click',onFirst);
  hint.textContent='🌬️ listening…';
  overlay.classList.add('show');
});

})();
</script>
